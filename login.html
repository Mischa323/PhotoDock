<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0d2218;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #122b1c;
            border-radius: 14px;
            padding: 40px 36px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
            border: 1px solid #1e3d28;
        }

        .logo {
            text-align: center;
            margin-bottom: 8px;
            font-size: 28px;
        }

        h1 {
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
            text-align: center;
        }

        .subtitle {
            color: #6a9e7a;
            font-size: 13px;
            text-align: center;
            margin-bottom: 28px;
        }

        label {
            display: block;
            color: #8ab898;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            background: #1a3526;
            border: 1px solid #265c37;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            padding: 11px 14px;
            outline: none;
            margin-bottom: 18px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: #29c76f;
            box-shadow: 0 0 0 3px rgba(41,199,111,0.15);
        }

        button {
            width: 100%;
            background: #29c76f;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
            letter-spacing: 0.01em;
        }

        button:hover {
            background: #1ea854;
            box-shadow: 0 4px 16px rgba(41,199,111,0.3);
        }

        .error {
            background: rgba(192,57,43,0.15);
            border: 1px solid rgba(192,57,43,0.4);
            color: #e74c3c;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 18px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🖼</div>
        <h1>Terminal Photo Display</h1>
        <p class="subtitle">Sign in to continue</p>

        <div id="errorMsg" class="error" style="display:none">
            Incorrect username or password.
        </div>

        <form method="POST" action="/login">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autofocus autocomplete="username">

            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password">

            <button type="submit">Sign in</button>
        </form>
    </div>

    <script>
        const err = new URLSearchParams(location.search).get('error');
        if (err === 'locked') {
            const el = document.getElementById('errorMsg');
            el.textContent = 'Too many failed attempts. Try again in 15 minutes.';
            el.style.display = 'block';
        } else if (err) {
            document.getElementById('errorMsg').style.display = 'block';
        }
    </script>
</body>
</html>
