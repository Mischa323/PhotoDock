<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Photo Display for TNMLS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent:       #06b6d4;
            --accent-hover: #0891b2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0c1e2e;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #0f2a3a;
            border-radius: 14px;
            padding: 40px 36px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
            border: 1px solid #173d57;
        }

        .logo { text-align: center; margin-bottom: 8px; font-size: 28px; }

        h1 { color: #fff; font-size: 22px; font-weight: 700; margin-bottom: 6px; text-align: center; }

        .subtitle { color: #6ab8c8; font-size: 13px; text-align: center; margin-bottom: 28px; }

        label {
            display: block;
            color: #7dd3e8;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            background: #0f3347;
            border: 1px solid #1a5272;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            padding: 11px 14px;
            outline: none;
            margin-bottom: 18px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(6,182,212,0.15);
        }

        button {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
        }

        button:hover { background: var(--accent-hover); box-shadow: 0 4px 16px rgba(6,182,212,0.3); }

        .error {
            background: rgba(192,57,43,0.15);
            border: 1px solid rgba(192,57,43,0.4);
            color: #e74c3c;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 18px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🖼</div>
        <h1>Photo Display for TNMLS</h1>
        <p class="subtitle">Sign in to continue</p>

        <div id="errorMsg" class="error" style="display:none">Incorrect username or password.</div>

        <form method="POST" action="/login">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autofocus autocomplete="username">

            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password">

            <button type="submit">Sign in</button>
        </form>
    </div>

    <script>
        const err = new URLSearchParams(location.search).get('error');
        if (err === 'locked') {
            const el = document.getElementById('errorMsg');
            el.textContent = 'Too many failed attempts. Try again in 15 minutes.';
            el.style.display = 'block';
        } else if (err === 'blocked') {
            const el = document.getElementById('errorMsg');
            el.textContent = 'This account has been blocked. Contact an administrator.';
            el.style.display = 'block';
        } else if (err) {
            document.getElementById('errorMsg').style.display = 'block';
        }

        // Apply theme from settings
        fetch('/api/settings').then(r => r.json()).then(s => {
            if (!s.accentColor) return;
            const c = s.accentColor;
            const num = parseInt(c.replace('#',''), 16);
            const clamp = v => Math.min(255, Math.max(0, v));
            const shade = pct => {
                const r = clamp((num>>16) + Math.round(255*pct/100));
                const g = clamp(((num>>8)&255) + Math.round(255*pct/100));
                const b = clamp((num&255) + Math.round(255*pct/100));
                return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
            };
            document.documentElement.style.setProperty('--accent', c);
            document.documentElement.style.setProperty('--accent-hover', shade(-15));
        }).catch(() => {});
    </script>
</body>
</html>
