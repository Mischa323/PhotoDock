services:
  image-upload:
    image: ghcr.io/mischa323/terminal-photo-display:latest
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      PORT: ${PORT:-8080}
      DATA_FILE: /data/data.json
      UPLOADS_DIR: /data/uploads
    volumes:
      - ./data:/data
    restart: unless-stopped

volumes: {}
