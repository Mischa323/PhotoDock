services:
  image-upload:
    image: ghcr.io/mischa323/terminal-photo-display:latest
    ports:
      - "${HOST_PORT:-8080}:${PORT:-8080}"
    environment:
      PORT: ${PORT:-8080}
      DATA_FILE: /data/data.json
      UPLOADS_DIR: /data/uploads
    volumes:
      # All persistent data (images + data.json) lives here.
      # Change ./data to any host path you want, or use a named volume.
      - ./data:/data
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Passes your Docker login credentials so Watchtower can pull from ghcr.io
      - ${HOME}/.docker/config.json:/config.json:ro
    environment:
      DOCKER_CONFIG: /
    command: --interval 300 --cleanup
    restart: unless-stopped
