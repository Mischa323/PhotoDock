services:
  image-upload:
    image: ghcr.io/mischa323/terminal-photo-display:latest
    environment:
      PORT: ${PORT:-8080}
      DATA_FILE: /data/data.json
      UPLOADS_DIR: /data/uploads
      CADDY_ADMIN: http://caddy:2019
    volumes:
      - ./data:/data
    restart: unless-stopped
    depends_on:
      - caddy

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
      PORT: ${PORT:-8080}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    command: caddy run --resume --config /etc/caddy/Caddyfile --adapter caddyfile
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
