<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Two-Factor Auth — Photo Display for TNMLS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #06b6d4; --accent-hover: #0891b2; }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0d2218;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #122b1c;
            border-radius: 14px;
            padding: 40px 36px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
            border: 1px solid #1e3d28;
        }

        .icon {
            font-size: 36px;
            text-align: center;
            margin-bottom: 12px;
        }

        h1 {
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
        }

        p.sub {
            color: #8892a4;
            font-size: 14px;
            text-align: center;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .code-input {
            width: 100%;
            background: #1a3526;
            border: 2px solid #265c37;
            border-radius: 10px;
            color: #fff;
            font-size: 28px;
            font-family: monospace;
            letter-spacing: 8px;
            text-align: center;
            padding: 14px 10px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            -moz-appearance: textfield;
        }

        .code-input::-webkit-outer-spin-button,
        .code-input::-webkit-inner-spin-button { -webkit-appearance: none; }

        .code-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(41,199,111,0.15);
        }

        .btn {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            margin-top: 16px;
            transition: background 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 16px rgba(41,199,111,0.3);
        }
        .btn:disabled { background: #1a4a2a; cursor: default; box-shadow: none; }

        .error {
            color: #e74c3c;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            min-height: 18px;
        }

        .back {
            display: block;
            text-align: center;
            color: #8892a4;
            font-size: 13px;
            margin-top: 20px;
            text-decoration: none;
        }

        .back:hover { color: #fff; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon" id="icon">&#128274;</div>
    <h1>Two-Factor Auth</h1>
    <p class="sub" id="subMsg">Enter the 6-digit code from your authenticator app.</p>

    <input type="number" class="code-input" id="codeInput"
           placeholder="000000" maxlength="6" autofocus
           oninput="onInput()" onkeydown="onKey(event)">

    <button class="btn" id="submitBtn" onclick="submit()">Verify</button>
    <button class="btn" id="resendBtn" onclick="resend()"
        style="display:none;margin-top:8px;background:rgba(255,255,255,0.08);font-size:13px;font-weight:500;padding:10px">
        Resend code
    </button>
    <p class="error" id="errorMsg"></p>
    <a href="/login" class="back">&#8592; Back to login</a>
</div>

<script>
    fetch('/api/settings').then(r=>r.json()).then(s=>{
        if(!s.accentColor) return;
        const c=s.accentColor, n=parseInt(c.replace('#',''),16);
        const cl=v=>Math.min(255,Math.max(0,v));
        const shade=p=>'#'+[cl((n>>16)+Math.round(255*p/100)),cl(((n>>8)&255)+Math.round(255*p/100)),cl((n&255)+Math.round(255*p/100))].map(v=>v.toString(16).padStart(2,'0')).join('');
        document.documentElement.style.setProperty('--accent',c);
        document.documentElement.style.setProperty('--accent-hover',shade(-15));
    }).catch(()=>{});

    const params       = new URLSearchParams(location.search);
    const pendingToken = params.get('t');
    const method       = params.get('method') || 'totp';

    if (!pendingToken) location.href = '/login';

    if (method === 'email') {
        document.getElementById('icon').textContent    = '📧';
        document.getElementById('subMsg').textContent  = 'Check your email for a 6-digit code and enter it below.';
        document.getElementById('resendBtn').style.display = '';
    }

    function onInput() {
        const v = document.getElementById('codeInput').value;
        if (v.length > 6) document.getElementById('codeInput').value = v.slice(0, 6);
        document.getElementById('errorMsg').textContent = '';
    }

    function onKey(e) {
        if (e.key === 'Enter') submit();
    }

    async function submit() {
        const code = document.getElementById('codeInput').value.trim();
        if (code.length !== 6) {
            document.getElementById('errorMsg').textContent = 'Enter a 6-digit code.';
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = 'Verifying…';

        const res  = await fetch('/api/2fa/complete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pendingToken, code })
        });
        const data = await res.json();

        if (res.ok) {
            location.href = '/';
        } else {
            document.getElementById('errorMsg').textContent = data.error || 'Verification failed.';
            document.getElementById('codeInput').value = '';
            btn.disabled = false;
            btn.textContent = 'Verify';
        }
    }

    async function resend() {
        const btn = document.getElementById('resendBtn');
        btn.disabled = true;
        btn.textContent = 'Sending…';
        const res  = await fetch('/api/2fa/email/resend', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pendingToken })
        });
        const data = await res.json();
        document.getElementById('errorMsg').style.color = res.ok ? '#4caf50' : '#e74c3c';
        document.getElementById('errorMsg').textContent = res.ok
            ? `Code resent to ${data.email}.`
            : (data.error || 'Could not resend.');
        btn.disabled = false;
        btn.textContent = 'Resend code';
    }
</script>
</body>
</html>
