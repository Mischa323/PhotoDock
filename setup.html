<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: sans-serif;
            background: #111;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #1e1e1e;
            border-radius: 12px;
            padding: 40px 36px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        h1 { color: #fff; font-size: 22px; margin-bottom: 6px; text-align: center; }
        p  { color: #888; font-size: 13px; text-align: center; margin-bottom: 28px; }

        label {
            display: block;
            color: #aaa;
            font-size: 13px;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            font-size: 15px;
            padding: 10px 12px;
            outline: none;
            margin-bottom: 18px;
            transition: border-color 0.2s;
        }

        input:focus { border-color: #4a90e2; }

        button {
            width: 100%;
            background: #4a90e2;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 11px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #357abd; }

        .error {
            background: rgba(192,57,43,0.2);
            border: 1px solid rgba(192,57,43,0.5);
            color: #e74c3c;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 13px;
            margin-bottom: 18px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Welcome</h1>
        <p>Create your admin account to get started.</p>

        <div class="error" id="errorMsg"></div>

        <label for="username">Username</label>
        <input type="text" id="username" autofocus autocomplete="username">

        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="new-password">

        <button onclick="setup()">Create Account</button>
    </div>

    <script>
        async function setup() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl  = document.getElementById('errorMsg');
            errorEl.style.display = 'none';

            if (!username || !password) {
                errorEl.textContent = 'Please fill in both fields.';
                errorEl.style.display = 'block';
                return;
            }

            const res  = await fetch('/api/setup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (!res.ok) {
                errorEl.textContent = data.error;
                errorEl.style.display = 'block';
                return;
            }

            window.location.href = '/';
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter') setup(); });
    </script>
</body>
</html>
