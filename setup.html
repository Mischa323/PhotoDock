<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup — Photo Display for TNMLS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent:       #06b6d4;
            --accent-hover: #0891b2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0c1e2e;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #0f2a3a;
            border-radius: 14px;
            padding: 40px 36px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
            border: 1px solid #173d57;
        }

        .logo { text-align: center; margin-bottom: 8px; font-size: 28px; }
        h1 { color: #fff; font-size: 22px; font-weight: 700; margin-bottom: 6px; text-align: center; }
        p  { color: #6ab8c8; font-size: 13px; text-align: center; margin-bottom: 28px; }

        label {
            display: block;
            color: #7dd3e8;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            background: #0f3347;
            border: 1px solid #1a5272;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            padding: 11px 14px;
            outline: none;
            margin-bottom: 18px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(6,182,212,0.15); }

        button {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
        }

        button:hover { background: var(--accent-hover); box-shadow: 0 4px 16px rgba(6,182,212,0.3); }

        .error {
            background: rgba(192,57,43,0.15);
            border: 1px solid rgba(192,57,43,0.4);
            color: #e74c3c;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 18px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🖼</div>
        <h1>Photo Display for TNMLS</h1>
        <p>Create your admin account to get started.</p>

        <div class="error" id="errorMsg"></div>

        <label for="username">Username</label>
        <input type="text" id="username" autofocus autocomplete="username">

        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="new-password">

        <button onclick="setup()">Create Account</button>
    </div>

    <script>
        async function setup() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl  = document.getElementById('errorMsg');
            errorEl.style.display = 'none';
            if (!username || !password) { errorEl.textContent = 'Please fill in both fields.'; errorEl.style.display = 'block'; return; }
            const res  = await fetch('/api/setup', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
            const data = await res.json();
            if (!res.ok) { errorEl.textContent = data.error; errorEl.style.display = 'block'; return; }
            window.location.href = '/';
        }
        document.addEventListener('keydown', e => { if (e.key === 'Enter') setup(); });
    </script>
</body>
</html>
