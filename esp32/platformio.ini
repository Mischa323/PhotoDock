; Shared settings for every board target.
[env]
platform   = espressif32@^6.6.0
framework  = arduino
board      = esp32s3box

; OPI PSRAM is required for the image buffers on both boards.
board_build.arduino.memory_type = qio_opi
board_build.flash_mode          = qio

; Auto-copy the built binaries into ../firmware_build/<model>/ after each build
; so the manual-flash files never go stale.
extra_scripts = post:copy_firmware.py

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    bitbank2/JPEGDEC@^1.2.2
    lewisxhe/XPowersLib@^0.2.4
    ricmoo/QRCode@^0.0.1

monitor_speed = 115200
upload_speed  = 921600

; ── Waveshare ESP32-S3 PhotoPainter (7.3" E6 Spectra 6, AXP2101) ──────────────
[env:esp32s3-photopainter]
build_flags =
    ${env.build_flags}
    -DBOARD_PHOTOPAINTER

; ── Seeed reTerminal E1001 (7.5" UC8179 monochrome / 4-gray) ──────────────────
[env:reterminal-e1001]
build_flags =
    ${env.build_flags}
    -DBOARD_RETERMINAL_E1001
