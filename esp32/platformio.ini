[env:esp32s3-photopainter]
platform = espressif32@^6.6.0
board     = esp32s3box
framework = arduino

; ESP32-S3-PhotoPainter has OPI PSRAM — required for the image buffers
board_build.arduino.memory_type = qio_opi
board_build.flash_mode          = qio

; Auto-copy the built binaries into ../firmware_build after each build so the
; manual-flash files never go stale.
extra_scripts = post:copy_firmware.py

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    bitbank2/JPEGDEC@^1.2.2
    lewisxhe/XPowersLib@^0.2.4

monitor_speed = 115200
upload_speed  = 921600
