<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Choose a new password — PhotoDock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/glass.css">
  <style>
    body { height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .glow { position: absolute; width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, rgba(6,182,212,0.12), transparent 70%); pointer-events: none; z-index: 1; }
    .card { position: relative; z-index: 2; border-radius: 24px; padding: 44px 40px; width: 360px; max-width: 90vw; }
    .logo-wrap { display: flex; justify-content: center; margin-bottom: 24px; }
    .logo-box { width: 56px; height: 56px; border-radius: 14px; display: flex; align-items: center; justify-content: center; }
    h1 { font-size: 22px; font-weight: 700; text-align: center; letter-spacing: -0.02em; color: rgba(255,255,255,0.95); margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: rgba(255,255,255,0.4); text-align: center; margin-bottom: 32px; line-height: 1.5; }
    .field { margin-bottom: 14px; }
    .field:last-of-type { margin-bottom: 24px; }
    .submit-btn { width: 100%; padding: 13px; font-size: 15px; border-radius: 12px; }
  </style>
</head>
<body>
  <div class="space-bg"></div>
  <div class="glow"></div>

  <div class="card glass-dark fade-in">
    <div class="logo-wrap"><div class="logo-box glass"><img src="/favicon.svg" width="36" height="36" alt="logo"></div></div>
    <h1>New password</h1>
    <p class="subtitle" id="subtitle">Checking your reset link…</p>

    <div id="errorMsg" class="error-banner" style="display:none"></div>
    <div id="okMsg" class="success-banner" style="display:none">Password updated. Redirecting to sign in…</div>

    <form id="form" style="display:none">
      <div class="field">
        <div class="field-label">New password</div>
        <input class="glass-input" type="password" id="pw1" placeholder="At least 8 characters" autocomplete="new-password" required>
      </div>
      <div class="field">
        <div class="field-label">Confirm password</div>
        <input class="glass-input" type="password" id="pw2" placeholder="Repeat your password" autocomplete="new-password" required>
      </div>
      <button type="submit" class="cyan-btn submit-btn" id="btn">Set new password</button>
    </form>

    <p style="text-align:center;margin-top:18px">
      <a href="/login" style="font-size:13px;color:rgba(255,255,255,0.5);text-decoration:none">← Back to sign in</a>
    </p>
  </div>

  <script>
    const token = decodeURIComponent(location.pathname.split('/').filter(Boolean).pop() || '');
    const subtitle = document.getElementById('subtitle');
    const form = document.getElementById('form');
    const errEl = document.getElementById('errorMsg');

    function fail(msg) { subtitle.textContent = ''; form.style.display = 'none'; errEl.textContent = msg; errEl.style.display = 'block'; }

    (async () => {
      try {
        const res = await fetch('/api/reset/' + encodeURIComponent(token));
        const data = await res.json();
        if (!res.ok) return fail(data.error || 'This reset link is invalid or has expired.');
        subtitle.textContent = 'Choose a new password for ' + (data.username || 'your account') + '.';
        form.style.display = 'block';
        document.getElementById('pw1').focus();
      } catch { fail('Could not verify this reset link. Try again later.'); }
    })();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw1 = document.getElementById('pw1').value, pw2 = document.getElementById('pw2').value;
      errEl.style.display = 'none';
      if (pw1.length < 8) { errEl.textContent = 'Password must be at least 8 characters.'; errEl.style.display = 'block'; return; }
      if (pw1 !== pw2)    { errEl.textContent = 'Passwords do not match.'; errEl.style.display = 'block'; return; }
      const btn = document.getElementById('btn'); btn.disabled = true; btn.textContent = 'Saving…';
      try {
        const res = await fetch('/api/password/reset', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: pw1 })
        });
        const data = await res.json();
        if (!res.ok) { btn.disabled = false; btn.textContent = 'Set new password';
          errEl.textContent = data.error || 'Could not reset your password.'; errEl.style.display = 'block'; return; }
        form.style.display = 'none';
        document.getElementById('okMsg').style.display = 'block';
        setTimeout(() => location.href = '/login', 1800);
      } catch { btn.disabled = false; btn.textContent = 'Set new password';
        errEl.textContent = 'Network error. Try again.'; errEl.style.display = 'block'; }
    });
  </script>
</body>
</html>
