<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Photo Display for TNMLS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: #fff;
        }

        /* ── Header ───────────────────────────────────────────────────── */
        header {
            position: sticky;
            top: 0; left: 0; right: 0;
            height: 60px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 30;
            background: rgba(10,10,10,0.92);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }

        header h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.03em;
        }

        .header-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn {
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
            text-decoration: none;
            font-family: inherit;
        }

        :root { --accent: #06b6d4; --accent-hover: #0891b2; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-primary:disabled { background: #555; cursor: default; }

        .btn-ghost {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .btn-ghost:hover { background: rgba(255,255,255,0.18); }

        input[type="file"] { display: none; }

        /* ── Screen tabs ──────────────────────────────────────────────── */
        .screen-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: rgba(0,0,0,0.4);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            overflow-x: auto;
            flex-wrap: nowrap;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.15) transparent;
            position: sticky;
            top: 60px;
            z-index: 20;
        }

        .screen-tab {
            flex-shrink: 0;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.65);
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
            font-family: inherit;
        }
        .screen-tab:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .screen-tab.active { background: var(--accent); color: #fff; }

        .new-screen-btn {
            flex-shrink: 0;
            border: 1px dashed rgba(255,255,255,0.25);
            padding: 5px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            background: transparent;
            color: rgba(255,255,255,0.45);
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            font-family: inherit;
        }
        .new-screen-btn:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.45); }

        /* ── Select toolbar ───────────────────────────────────────────── */
        .select-toolbar {
            display: none;
            position: sticky;
            top: 112px;
            z-index: 15;
            background: rgba(10,10,10,0.95);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 8px 24px;
            align-items: center;
            gap: 12px;
        }
        .select-toolbar.visible { display: flex; }

        /* ── Gallery ──────────────────────────────────────────────────── */
        .gallery-container {
            padding: 24px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }

        .thumb {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s, transform 0.15s;
            background: #111;
        }
        .thumb:hover { border-color: rgba(255,255,255,0.2); transform: scale(1.02); }
        .thumb.selected { border-color: var(--accent); }

        .thumb img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            display: block;
        }

        .thumb .del {
            position: absolute;
            top: 5px; right: 5px;
            background: rgba(0,0,0,0.55);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 26px; height: 26px;
            cursor: pointer;
            font-size: 16px;
            line-height: 26px;
            text-align: center;
            display: none;
            font-family: inherit;
        }
        .thumb:hover .del { display: block; }
        .thumb .del:hover { background: rgba(192,57,43,0.85); }

        .thumb-check {
            position: absolute;
            top: 5px; left: 5px;
            width: 20px; height: 20px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.7);
            background: rgba(0,0,0,0.35);
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #fff;
            pointer-events: none;
        }
        .select-mode .thumb-check { display: flex; }
        .thumb.selected .thumb-check { background: var(--accent); border-color: var(--accent); }

        .thumb-fav {
            position: absolute;
            top: 5px; left: 5px;
            width: 26px; height: 26px;
            border-radius: 50%;
            background: rgba(0,0,0,0.45);
            border: none;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            padding: 0;
            z-index: 2;
            transition: background 0.15s, color 0.15s;
        }
        .thumb-fav.faved { display: flex; color: #f87171; }
        .thumb:hover .thumb-fav { display: flex; }
        .thumb-fav:hover { background: rgba(0,0,0,0.7); color: #f87171; }
        .select-mode .thumb-fav { display: none !important; }

        .thumb-uploader {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.65));
            color: rgba(255,255,255,0.85);
            font-size: 11px;
            padding: 14px 7px 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
        }

        .thumb-screen-badge {
            position: absolute;
            bottom: 5px; right: 5px;
            background: rgba(6,182,212,0.8);
            color: #fff;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            pointer-events: none;
            max-width: 90px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .thumb-assign {
            position: absolute;
            bottom: 5px; left: 5px;
            background: rgba(0,0,0,0.6);
            color: rgba(255,255,255,0.75);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 10px;
            cursor: pointer;
            display: none;
            font-family: inherit;
            white-space: nowrap;
        }
        .thumb:hover .thumb-assign { display: block; }
        .thumb-assign:hover { background: rgba(0,0,0,0.85); color: #fff; }

        /* ── Empty state ──────────────────────────────────────────────── */
        .empty-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            color: #888;
            font-size: 18px;
            padding: 80px 24px;
            text-align: center;
        }
        .empty-state svg { width: 56px; height: 56px; fill: #555; }

        /* ── Upload dropdown ──────────────────────────────────────────── */
        .upload-wrap { position: relative; }

        .upload-menu {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: #1c1c1c;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            min-width: 190px;
            z-index: 200;
            overflow: hidden;
            box-shadow: 0 6px 24px rgba(0,0,0,0.5);
        }
        .upload-menu.open { display: block; }

        .upload-menu-item {
            padding: 10px 14px;
            font-size: 13px;
            cursor: pointer;
            color: #ddd;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .upload-menu-item:last-child { border-bottom: none; }
        .upload-menu-item:hover { background: rgba(255,255,255,0.08); color: #fff; }

        /* ── Slideshow overlay ────────────────────────────────────────── */
        .slideshow-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
        }
        .slideshow-overlay.open { display: block; }

        .slide {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: opacity 1s ease;
            opacity: 0;
        }
        .slide.active { opacity: 1; }

        .ss-header {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 60px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 20;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
            transition: opacity 0.4s;
        }

        .ss-bottom {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
            z-index: 20;
            transition: opacity 0.4s;
        }

        .dots { display: flex; gap: 7px; flex-wrap: wrap; max-width: 60%; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.4); cursor: pointer; transition: background 0.2s, transform 0.2s; }
        .dot.active { background: #fff; transform: scale(1.3); }

        .timer-bar-wrap { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.15); z-index: 21; transition: opacity 0.4s; }
        .timer-bar { height: 100%; background: #29c76f; width: 0%; }

        .arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.35); border: none; color: #fff; font-size: 28px; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; z-index: 20; display: flex; align-items: center; justify-content: center; transition: background 0.2s, opacity 0.4s; }
        .arrow:hover { background: rgba(0,0,0,0.6); }
        .arrow-left  { left:  16px; }
        .arrow-right { right: 16px; }

        .slideshow-overlay.idle .ss-header,
        .slideshow-overlay.idle .ss-bottom,
        .slideshow-overlay.idle .timer-bar-wrap,
        .slideshow-overlay.idle .arrow { opacity: 0; pointer-events: none; }
        .slideshow-overlay.idle { cursor: none; }

        /* Date overlay (inside slideshow) */
        .date-overlay { position: absolute; z-index: 30; pointer-events: none; transition: opacity 0.4s; }
        .date-overlay.hidden { opacity: 0; }
        .date-overlay .date-day { font-size: 15px; font-weight: 600; color: #fff; text-shadow: 0 1px 6px rgba(0,0,0,0.7); letter-spacing: 0.03em; }
        .date-overlay .date-time { font-size: 13px; color: rgba(255,255,255,0.75); text-shadow: 0 1px 4px rgba(0,0,0,0.6); }

        /* ── Drop overlay ─────────────────────────────────────────────── */
        .drop-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(74,144,226,0.2);
            border: 3px dashed #29c76f;
            z-index: 50;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 600;
            color: #29c76f;
        }
        .drop-overlay.active { display: flex; }

        /* ── Toast ────────────────────────────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(60px);
            background: #222; color: #fff;
            padding: 10px 22px; border-radius: 6px;
            font-size: 14px; opacity: 0;
            transition: opacity 0.25s, transform 0.25s;
            pointer-events: none; z-index: 300; white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error { background: #c0392b; }

        /* ── Modal ────────────────────────────────────────────────────── */
        .modal-backdrop {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.7); z-index: 200;
            align-items: center; justify-content: center;
        }
        .modal-backdrop.open { display: flex; }

        .modal {
            background: #1a1a1a; border-radius: 12px; padding: 28px;
            width: 360px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        .modal h3 { font-size: 16px; margin-bottom: 20px; }
        .modal .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
        .modal label { font-size: 13px; color: #aaa; }
        .modal input, .modal select {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
            color: #fff; border-radius: 6px; padding: 9px 12px; font-size: 14px; outline: none;
            font-family: inherit; width: 100%;
        }
        .modal input:focus, .modal select:focus { border-color: var(--accent); }
        .modal select option { background: #1a1a1a; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
        .btn-cancel { background: rgba(255,255,255,0.08); color: #ccc; border: none; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-size: 14px; font-family: inherit; }
        .btn-cancel:hover { background: rgba(255,255,255,0.15); }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <h1>My Photos</h1>
        <div class="header-right">
            <a href="/admin.html" class="btn btn-ghost" style="text-decoration:none" data-admin>&#9881; Settings</a>
            <form method="POST" action="/logout" style="margin:0">
                <button class="btn btn-ghost" type="submit">Log out</button>
            </form>
            <button class="btn btn-ghost" id="slideshowBtn">&#9654; Slideshow</button>
            <div class="upload-wrap">
                <button class="btn btn-primary" id="uploadMenuBtn">&#8679; Upload &#9662;</button>
                <div class="upload-menu" id="uploadMenu"></div>
            </div>
            <input type="file" id="fileInput" accept="image/*,.heic,.heif" multiple>
        </div>
    </header>

    <!-- Screen tabs -->
    <div class="screen-bar" id="screenBar">
        <button class="screen-tab active" id="tabAll">All Photos</button>
        <!-- screen tabs injected here -->
        <button class="new-screen-btn" id="newScreenBtn">+ New Screen</button>
    </div>

    <!-- Select toolbar -->
    <div class="select-toolbar" id="selectToolbar">
        <span id="selectCount" style="font-size:14px;color:#ccc">0 selected</span>
        <button class="btn btn-ghost" id="cancelSelectBtn" style="font-size:13px;padding:6px 14px">Cancel</button>
        <button class="btn" id="deleteSelectedBtn" style="background:#c0392b;color:#fff;font-size:13px;padding:6px 14px" data-delete>Delete selected</button>
    </div>

    <!-- Gallery -->
    <div class="gallery-container">
        <div class="gallery-grid" id="galleryGrid"></div>
        <div class="empty-state" id="emptyState">
            <svg viewBox="0 0 24 24"><path d="M21 19V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2zm-9-2l-3-4-2 2.5L5 19h14l-4-5.5-3 3.5z"/></svg>
            No images yet — click Upload to add some.
        </div>
    </div>

    <!-- Slideshow overlay -->
    <div class="slideshow-overlay" id="slideshowOverlay">
        <div class="ss-header">
            <span style="font-size:15px;font-weight:600;opacity:0.8" id="ssLabel">Slideshow</span>
            <div style="display:flex;gap:8px">
                <button class="btn btn-ghost" id="pauseBtn">&#9646;&#9646; Pause</button>
                <button class="btn btn-ghost" id="slideshowCloseBtn">&#10005; Close</button>
            </div>
        </div>
        <div id="slides"></div>
        <button class="arrow arrow-left"  id="arrowLeft">&#8249;</button>
        <button class="arrow arrow-right" id="arrowRight">&#8250;</button>
        <div class="ss-bottom">
            <div class="dots" id="dots"></div>
        </div>
        <div class="timer-bar-wrap"><div class="timer-bar" id="timerBar"></div></div>
        <div class="date-overlay hidden" id="dateOverlay">
            <div class="date-day" id="dateDay"></div>
            <div class="date-time" id="dateTime"></div>
        </div>
    </div>

    <!-- New Screen modal -->
    <div class="modal-backdrop" id="newScreenModal">
        <div class="modal">
            <h3>New Screen</h3>
            <div class="field">
                <label>Screen name</label>
                <input type="text" id="newScreenName" placeholder="e.g. Living Room Display" maxlength="60">
            </div>
            <div class="field">
                <label>Description (optional)</label>
                <input type="text" id="newScreenDesc" placeholder="Short description" maxlength="120">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" id="cancelNewScreenBtn">Cancel</button>
                <button class="btn btn-primary" id="saveNewScreenBtn">Create Screen</button>
            </div>
        </div>
    </div>

    <!-- Assign screen modal -->
    <div class="modal-backdrop" id="assignModal">
        <div class="modal">
            <h3 id="assignModalTitle">Assign to Screen</h3>
            <div class="field">
                <label>Screen</label>
                <select id="assignScreenSel">
                    <option value="">No screen (unassigned)</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" id="cancelAssignBtn">Cancel</button>
                <button class="btn btn-primary" id="saveAssignBtn">Assign</button>
            </div>
        </div>
    </div>

    <!-- Drop overlay -->
    <div class="drop-overlay" id="dropOverlay">Drop images to upload</div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        let slideshowInterval = 30000;
        let allImages  = [];
        let ssImages   = []; // images currently in the slideshow
        let current    = 0;
        let paused     = false;
        let favorites  = new Set();
        let screens    = [];
        let activeScreen       = null; // null = "All Photos"
        let uploadTargetScreen = null;
        let assigningFilename  = null;
        let selectMode = false;
        const selected = new Set();
        let timer = null, timerStart = null, timerBarAnim = null;

        const galleryGrid      = document.getElementById('galleryGrid');
        const emptyState       = document.getElementById('emptyState');
        const timerBar         = document.getElementById('timerBar');
        const pauseBtn         = document.getElementById('pauseBtn');
        const fileInput        = document.getElementById('fileInput');
        const toastEl          = document.getElementById('toast');
        const slidesEl         = document.getElementById('slides');
        const dotsEl           = document.getElementById('dots');
        const slideshowOverlay = document.getElementById('slideshowOverlay');

        // ── Toast ────────────────────────────────────────────────────
        let toastTimer;
        function showToast(msg, type = '') {
            clearTimeout(toastTimer);
            toastEl.textContent = msg;
            toastEl.className = 'toast show ' + type;
            toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3200);
        }

        // ── Screens ──────────────────────────────────────────────────
        async function loadScreens() {
            try {
                const res = await fetch('/api/screens');
                screens = await res.json();
            } catch { screens = []; }
            renderScreenTabs();
            renderUploadMenu();
        }

        function renderScreenTabs() {
            const bar    = document.getElementById('screenBar');
            const newBtn = document.getElementById('newScreenBtn');
            bar.querySelectorAll('.screen-tab[data-screen-id]').forEach(el => el.remove());
            screens.forEach(s => {
                const tab = document.createElement('button');
                tab.className = 'screen-tab' + (activeScreen === s.id ? ' active' : '');
                tab.dataset.screenId = s.id;
                tab.textContent = s.name + (s.imageCount !== undefined ? ` (${s.imageCount})` : '');
                tab.onclick = () => { activeScreen = s.id; refreshTabs(); renderGallery(); updateSsLabel(); };
                bar.insertBefore(tab, newBtn);
            });
            document.getElementById('tabAll').classList.toggle('active', activeScreen === null);
        }

        function refreshTabs() {
            document.getElementById('tabAll').classList.toggle('active', activeScreen === null);
            document.querySelectorAll('.screen-tab[data-screen-id]').forEach(t =>
                t.classList.toggle('active', t.dataset.screenId === activeScreen));
        }

        function updateSsLabel() {
            const s = screens.find(s => s.id === activeScreen);
            document.getElementById('ssLabel').textContent = s ? s.name : 'All Photos';
        }

        document.getElementById('tabAll').onclick = () => {
            activeScreen = null;
            refreshTabs();
            renderGallery();
            updateSsLabel();
        };

        function renderUploadMenu() {
            const menu = document.getElementById('uploadMenu');
            menu.innerHTML = '';
            const allItem = document.createElement('button');
            allItem.className = 'upload-menu-item';
            allItem.innerHTML = '&#128247; All Photos (no screen)';
            allItem.onclick = () => triggerUpload(null);
            menu.appendChild(allItem);
            screens.forEach(s => {
                const item = document.createElement('button');
                item.className = 'upload-menu-item';
                item.textContent = '&#9632; ' + s.name;
                item.onclick = () => triggerUpload(s.id);
                menu.appendChild(item);
            });
        }

        // ── Upload dropdown ──────────────────────────────────────────
        document.getElementById('uploadMenuBtn').onclick = e => {
            e.stopPropagation();
            if (screens.length === 0) { triggerUpload(activeScreen); return; }
            document.getElementById('uploadMenu').classList.toggle('open');
        };
        document.addEventListener('click', () => document.getElementById('uploadMenu').classList.remove('open'));

        function triggerUpload(screenId) {
            uploadTargetScreen = screenId;
            document.getElementById('uploadMenu').classList.remove('open');
            fileInput.click();
        }

        // ── New Screen modal ─────────────────────────────────────────
        document.getElementById('newScreenBtn').onclick = () => {
            document.getElementById('newScreenModal').classList.add('open');
            setTimeout(() => document.getElementById('newScreenName').focus(), 50);
        };
        document.getElementById('cancelNewScreenBtn').onclick = () =>
            document.getElementById('newScreenModal').classList.remove('open');

        document.getElementById('saveNewScreenBtn').onclick = async () => {
            const name = document.getElementById('newScreenName').value.trim();
            const desc = document.getElementById('newScreenDesc').value.trim();
            if (!name) { showToast('Screen name is required.', 'error'); return; }
            try {
                const res = await fetch('/api/screens', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, description: desc })
                });
                if (!res.ok) throw new Error((await res.json()).error);
                document.getElementById('newScreenName').value = '';
                document.getElementById('newScreenDesc').value = '';
                document.getElementById('newScreenModal').classList.remove('open');
                showToast(`Screen "${name}" created.`);
                await loadScreens();
                await renderGallery();
            } catch (e) { showToast('Could not create screen: ' + e.message, 'error'); }
        };
        document.getElementById('newScreenName').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('saveNewScreenBtn').click();
            if (e.key === 'Escape') document.getElementById('cancelNewScreenBtn').click();
        });

        // ── Assign screen modal ──────────────────────────────────────
        function openAssignModal(filename) {
            assigningFilename = filename;
            const img = allImages.find(i => i.filename === filename);
            const sel = document.getElementById('assignScreenSel');
            sel.innerHTML = '<option value="">No screen (unassigned)</option>';
            screens.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.id;
                opt.textContent = s.name;
                if (img?.screenId === s.id) opt.selected = true;
                sel.appendChild(opt);
            });
            document.getElementById('assignModal').classList.add('open');
        }
        document.getElementById('cancelAssignBtn').onclick = () =>
            document.getElementById('assignModal').classList.remove('open');
        document.getElementById('saveAssignBtn').onclick = async () => {
            if (!assigningFilename) return;
            const screenId = document.getElementById('assignScreenSel').value || null;
            try {
                const res = await fetch(`/api/images/${encodeURIComponent(assigningFilename)}/screen`, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ screenId })
                });
                if (!res.ok) throw new Error((await res.json()).error);
                document.getElementById('assignModal').classList.remove('open');
                showToast('Screen assigned.');
                await loadImages();
                await loadScreens();
            } catch (e) { showToast('Error: ' + e.message, 'error'); }
        };

        // ── Render gallery ───────────────────────────────────────────
        function renderGallery() {
            const galleryEl = document.getElementById('galleryGrid');
            galleryEl.className = 'gallery-grid' + (selectMode ? ' select-mode' : '');
            galleryEl.innerHTML = '';

            const visible = activeScreen === null
                ? allImages
                : allImages.filter(img => img.screenId === activeScreen);

            if (visible.length === 0) {
                emptyState.style.display = 'flex';
                return;
            }
            emptyState.style.display = 'none';

            visible.forEach(img => {
                const thumb = document.createElement('div');
                thumb.className = 'thumb' + (selected.has(img.filename) ? ' selected' : '');
                thumb.onclick = () => {
                    if (selectMode) {
                        selected.has(img.filename) ? selected.delete(img.filename) : selected.add(img.filename);
                        thumb.classList.toggle('selected', selected.has(img.filename));
                        check.textContent = selected.has(img.filename) ? '✓' : '';
                        updateSelectToolbar();
                        return;
                    }
                    openSlideshow(visible.indexOf(img), visible);
                };

                const image = document.createElement('img');
                image.src = img.url;
                image.alt = img.filename;
                image.loading = 'lazy';
                thumb.appendChild(image);

                // Fav
                const fav = document.createElement('button');
                fav.className = 'thumb-fav' + (favorites.has(img.filename) ? ' faved' : '');
                fav.title = favorites.has(img.filename) ? 'Remove from favourites' : 'Add to favourites';
                fav.textContent = '♥';
                fav.onclick = async e => {
                    e.stopPropagation();
                    const isFav = favorites.has(img.filename);
                    const r = await fetch(`/api/favorites/${encodeURIComponent(img.filename)}`, { method: isFav ? 'DELETE' : 'POST' });
                    if (r.ok) {
                        isFav ? favorites.delete(img.filename) : favorites.add(img.filename);
                        fav.classList.toggle('faved', !isFav);
                        fav.title = favorites.has(img.filename) ? 'Remove from favourites' : 'Add to favourites';
                    }
                };
                thumb.appendChild(fav);

                // Check
                const check = document.createElement('div');
                check.className = 'thumb-check';
                check.textContent = selected.has(img.filename) ? '✓' : '';
                thumb.appendChild(check);

                // Delete
                const del = document.createElement('button');
                del.className = 'del';
                del.textContent = '×';
                del.title = 'Delete';
                del.dataset.delete = '';
                del.onclick = async e => {
                    e.stopPropagation();
                    if (!confirm('Delete this image?')) return;
                    const r = await fetch(`/api/images/${encodeURIComponent(img.filename)}`, { method: 'DELETE' });
                    if (r.ok) { favorites.delete(img.filename); showToast('Deleted.'); await loadImages(); await loadScreens(); }
                    else showToast('Could not delete.', 'error');
                };
                thumb.appendChild(del);

                // Uploader label
                if (img.uploadedBy) {
                    const lbl = document.createElement('div');
                    lbl.className = 'thumb-uploader';
                    lbl.textContent = img.uploadedBy;
                    thumb.appendChild(lbl);
                }

                // Screen badge (only in "All" view)
                if (activeScreen === null && img.screenId) {
                    const s = screens.find(s => s.id === img.screenId);
                    if (s) {
                        const badge = document.createElement('span');
                        badge.className = 'thumb-screen-badge';
                        badge.textContent = s.name;
                        thumb.appendChild(badge);
                    }
                }

                // Assign to screen button
                if (screens.length > 0) {
                    const assignBtn = document.createElement('button');
                    assignBtn.className = 'thumb-assign';
                    assignBtn.textContent = img.screenId ? '⊙ Change screen' : '⊕ Add to screen';
                    assignBtn.onclick = e => { e.stopPropagation(); openAssignModal(img.filename); };
                    thumb.appendChild(assignBtn);
                }

                galleryEl.appendChild(thumb);
            });
        }

        // ── Select mode ──────────────────────────────────────────────
        function updateSelectToolbar() {
            const n = selected.size;
            document.getElementById('selectCount').textContent = `${n} selected`;
            document.getElementById('selectToolbar').classList.toggle('visible', n > 0);
        }

        document.getElementById('cancelSelectBtn').onclick = () => {
            selectMode = false;
            selected.clear();
            updateSelectToolbar();
            renderGallery();
        };

        document.getElementById('deleteSelectedBtn').onclick = async () => {
            const filenames = [...selected];
            if (!filenames.length || !confirm(`Delete ${filenames.length} image(s)?`)) return;
            await Promise.all(filenames.map(f => fetch(`/api/images/${encodeURIComponent(f)}`, { method: 'DELETE' })));
            showToast(`${filenames.length} image(s) deleted.`);
            selectMode = false;
            selected.clear();
            updateSelectToolbar();
            await loadImages();
            await loadScreens();
        };

        // Long-press on mobile to enter select mode
        let longPressTimer;
        document.getElementById('galleryGrid').addEventListener('pointerdown', e => {
            const thumb = e.target.closest('.thumb');
            if (!thumb || selectMode) return;
            longPressTimer = setTimeout(() => {
                selectMode = true;
                const img = allImages.find(i => thumb.querySelector('img')?.src.endsWith('/uploads/' + i.filename));
                if (img) { selected.add(img.filename); updateSelectToolbar(); }
                renderGallery();
            }, 600);
        });
        document.getElementById('galleryGrid').addEventListener('pointerup', () => clearTimeout(longPressTimer));
        document.getElementById('galleryGrid').addEventListener('pointermove', () => clearTimeout(longPressTimer));

        // ── Slideshow ────────────────────────────────────────────────
        function openSlideshow(startIdx, imageSet) {
            ssImages = imageSet || allImages;
            current  = Math.max(0, Math.min(startIdx, ssImages.length - 1));
            renderSlides();
            slideshowOverlay.classList.add('open');
            goTo(current, false);
            if (!paused) startTimer();
            resetSlideshowIdle();
        }

        document.getElementById('slideshowBtn').onclick = () => {
            const visible = activeScreen === null ? allImages : allImages.filter(i => i.screenId === activeScreen);
            if (visible.length === 0) { showToast('No images to show.', 'error'); return; }
            openSlideshow(0, visible);
        };

        document.getElementById('slideshowCloseBtn').onclick = () => {
            slideshowOverlay.classList.remove('open');
            clearTimeout(timer);
            cancelAnimationFrame(timerBarAnim);
        };

        function renderSlides() {
            slidesEl.innerHTML = '';
            dotsEl.innerHTML   = '';
            ssImages.forEach((img, i) => {
                const slide = document.createElement('div');
                slide.className = 'slide' + (i === current ? ' active' : '');
                slide.style.backgroundImage = `url('${img.url}')`;
                slidesEl.appendChild(slide);
                const dot = document.createElement('div');
                dot.className = 'dot' + (i === current ? ' active' : '');
                dot.onclick = () => goTo(i);
                dotsEl.appendChild(dot);
            });
        }

        function goTo(index, resetTimer = true) {
            if (ssImages.length === 0) return;
            const slides = slidesEl.querySelectorAll('.slide');
            slides[current]?.classList.remove('active');
            dotsEl.querySelectorAll('.dot')[current]?.classList.remove('active');
            current = (index + ssImages.length) % ssImages.length;
            slides[current]?.classList.add('active');
            dotsEl.querySelectorAll('.dot')[current]?.classList.add('active');
            if (resetTimer && !paused) startTimer();
        }

        function startTimer() {
            clearTimeout(timer);
            cancelAnimationFrame(timerBarAnim);
            timerBar.style.transition = 'none';
            timerBar.style.width = '0%';
            timerStart = performance.now();
            const interval = slideshowInterval;
            (function animBar(now) {
                const pct = Math.min(((now - timerStart) / interval) * 100, 100);
                timerBar.style.width = pct + '%';
                if (pct < 100) timerBarAnim = requestAnimationFrame(animBar);
            })(timerStart);
            timer = setTimeout(() => goTo(current + 1), interval);
        }

        pauseBtn.onclick = () => {
            paused = !paused;
            if (paused) { clearTimeout(timer); cancelAnimationFrame(timerBarAnim); pauseBtn.innerHTML = '&#9654; Play'; }
            else { pauseBtn.innerHTML = '&#9646;&#9646; Pause'; startTimer(); }
        };

        document.getElementById('arrowLeft').onclick  = () => goTo(current - 1);
        document.getElementById('arrowRight').onclick = () => goTo(current + 1);

        document.addEventListener('keydown', e => {
            if (!slideshowOverlay.classList.contains('open')) return;
            if (e.key === 'ArrowLeft')  goTo(current - 1);
            if (e.key === 'ArrowRight') goTo(current + 1);
            if (e.key === ' ') { e.preventDefault(); pauseBtn.click(); }
            if (e.key === 'Escape') document.getElementById('slideshowCloseBtn').click();
        });

        // Idle hide in slideshow
        let idleTimer;
        function resetSlideshowIdle() {
            slideshowOverlay.classList.remove('idle');
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => slideshowOverlay.classList.add('idle'), 3000);
        }
        slideshowOverlay.addEventListener('mousemove', resetSlideshowIdle);
        slideshowOverlay.addEventListener('click', resetSlideshowIdle);

        // ── Load from server ─────────────────────────────────────────
        async function loadImages() {
            try {
                const [imgRes, favRes] = await Promise.all([fetch('/api/images'), fetch('/api/favorites')]);
                allImages = await imgRes.json();
                favorites = new Set(favRes.ok ? await favRes.json() : []);
                renderGallery();
            } catch { showToast('Could not connect to server.', 'error'); }
        }

        // ── Upload ───────────────────────────────────────────────────
        async function uploadFiles(files) {
            const ALLOWED_EXTS = /\.(jpg|jpeg|png|gif|webp|bmp|svg|heic|heif)$/i;
            const all    = Array.from(files);
            const imgs   = all.filter(f => f.type.startsWith('image/') || ALLOWED_EXTS.test(f.name));
            const bad    = all.filter(f => !f.type.startsWith('image/') && !ALLOWED_EXTS.test(f.name));
            if (bad.length) showToast(`Unsupported: ${bad.map(f => f.name).join(', ')}`, 'error');
            if (!imgs.length) return;

            const btn = document.getElementById('uploadMenuBtn');
            btn.disabled = true;
            btn.textContent = 'Uploading…';

            const fd = new FormData();
            imgs.forEach(f => fd.append('images', f));
            if (uploadTargetScreen) fd.append('screenId', uploadTargetScreen);

            try {
                const res  = await fetch('/api/upload', { method: 'POST', body: fd });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Upload failed');
                showToast(`${data.uploaded.length} image(s) uploaded.`);
                await loadImages();
                await loadScreens();
            } catch (err) { showToast('Upload failed: ' + err.message, 'error'); }
            finally {
                btn.disabled = false;
                btn.innerHTML = '&#8679; Upload &#9662;';
                fileInput.value = '';
                uploadTargetScreen = null;
            }
        }

        fileInput.addEventListener('change', () => uploadFiles(fileInput.files));

        // ── Drag & drop ──────────────────────────────────────────────
        let dragCounter = 0;
        const dropOverlay = document.getElementById('dropOverlay');
        document.addEventListener('dragenter', e => {
            if ([...e.dataTransfer.items].some(i => i.kind === 'file')) { dragCounter++; dropOverlay.classList.add('active'); }
        });
        document.addEventListener('dragleave', () => { if (--dragCounter === 0) dropOverlay.classList.remove('active'); });
        document.addEventListener('dragover', e => e.preventDefault());
        document.addEventListener('drop', e => {
            e.preventDefault();
            dragCounter = 0;
            dropOverlay.classList.remove('active');
            uploadTargetScreen = activeScreen;
            uploadFiles(e.dataTransfer.files);
        });

        // ── Date overlay ─────────────────────────────────────────────
        const dateOverlay = document.getElementById('dateOverlay');
        let displaySettings = { timezone: 'Europe/Amsterdam', showDayName: true, showDate: true, showTime: true, showSeconds: false };

        async function loadDisplaySettings() {
            try {
                const res = await fetch('/api/settings');
                displaySettings = await res.json();
                slideshowInterval = Math.max(1, displaySettings.slideshowInterval || 30) * 1000;
                if (displaySettings.accentColor) {
                    document.documentElement.style.setProperty('--accent', displaySettings.accentColor);
                }
            } catch {}
            applyDatePosition();
            updateDate();
        }

        function applyDatePosition() {
            const pos = displaySettings.datePosition || 'top-right';
            const isRight = pos.includes('right'), isBottom = pos.includes('bottom');
            const el = document.getElementById('dateOverlay');
            el.style.top    = isBottom ? 'auto' : '70px';
            el.style.bottom = isBottom ? '24px' : 'auto';
            el.style.left   = isRight  ? 'auto' : '24px';
            el.style.right  = isRight  ? '24px' : 'auto';
            el.style.textAlign = isRight ? 'right' : 'left';
        }

        function updateDate() {
            const s = displaySettings, tz = s.timezone || 'Europe/Amsterdam', now = new Date();
            const parts = [];
            if (s.showDayName) parts.push(now.toLocaleDateString('en-GB', { timeZone: tz, weekday: 'long' }));
            if (s.showDate)    parts.push(now.toLocaleDateString('en-GB', { timeZone: tz, day: 'numeric', month: 'long', year: 'numeric' }));
            document.getElementById('dateDay').textContent = parts.join(' ');
            document.getElementById('dateTime').textContent = s.showTime
                ? now.toLocaleTimeString('en-GB', { timeZone: tz, hour: '2-digit', minute: '2-digit', ...(s.showSeconds ? { second: '2-digit' } : {}) })
                : '';
            const hasContent = s.showDayName || s.showDate || s.showTime;
            dateOverlay.style.display = hasContent ? '' : 'none';
        }

        loadDisplaySettings();
        dateOverlay.classList.remove('hidden');
        setInterval(updateDate, 1000);

        // ── Role-based UI ─────────────────────────────────────────────
        async function applyRole() {
            try {
                const res  = await fetch('/api/me');
                const user = await res.json();
                const p    = user.permissions || {};
                if (!p.canManage) document.querySelectorAll('[data-admin]').forEach(el => el.style.display = 'none');
                if (!p.canUpload) document.getElementById('uploadMenuBtn').style.display = 'none';
                if (!p.canDelete) document.querySelectorAll('[data-delete]').forEach(el => el.style.display = 'none');
            } catch {}
        }

        // ── Init ─────────────────────────────────────────────────────
        applyRole();
        loadScreens().then(() => loadImages());
    </script>
</body>
</html>
