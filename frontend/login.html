<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Sign in — PhotoDock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/glass.css">
  <style>
    body {
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .glow {
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(6,182,212,0.12), transparent 70%);
      pointer-events: none;
      z-index: 1;
    }

    .card {
      position: relative;
      z-index: 2;
      border-radius: 24px;
      padding: 44px 40px;
      width: 360px;
      max-width: 90vw;
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }

    .logo-box {
      width: 56px; height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      letter-spacing: -0.02em;
      color: rgba(255,255,255,0.95);
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      text-align: center;
      margin-bottom: 32px;
      letter-spacing: 0.01em;
    }

    .field { margin-bottom: 14px; }
    .field:last-of-type { margin-bottom: 24px; }

    .submit-btn {
      width: 100%;
      padding: 13px;
      font-size: 15px;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="space-bg"></div>
  <div class="glow"></div>

  <div class="card glass-dark fade-in">
    <div class="logo-wrap">
      <div class="logo-box glass">
        <img src="/favicon.svg" width="36" height="36" alt="logo">
      </div>
    </div>

    <h1>PhotoDock</h1>
    <p class="subtitle">Sign in to continue</p>

    <div id="errorMsg" class="error-banner" style="display:none">Incorrect username or password.</div>

    <form method="POST" action="/login">
      <div class="field">
        <div class="field-label">Username</div>
        <input class="glass-input" type="text" name="username" placeholder="admin" autofocus autocomplete="username">
      </div>
      <div class="field">
        <div class="field-label">Password</div>
        <input class="glass-input" type="password" name="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="cyan-btn submit-btn">Sign in</button>
    </form>
    <p style="text-align:center;margin-top:18px">
      <a href="/forgot" style="font-size:13px;color:rgba(255,255,255,0.5);text-decoration:none">Forgot your password?</a>
    </p>
  </div>

  <script>
    const err = new URLSearchParams(location.search).get('error');
    const el  = document.getElementById('errorMsg');
    if (err === 'locked') {
      el.textContent = 'Too many failed attempts. Try again in 15 minutes.';
      el.style.display = 'block';
    } else if (err === 'blocked') {
      el.textContent = 'This account has been blocked. Contact an administrator.';
      el.style.display = 'block';
    } else if (err === 'email') {
      el.textContent = 'Could not send your login code. The email server may not be configured.';
      el.style.display = 'block';
    } else if (err) {
      el.style.display = 'block';
    }
  </script>
</body>
</html>
