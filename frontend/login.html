<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Sign in — PhotoDock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/glass.css">
  <style>
    body {
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .glow {
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(6,182,212,0.12), transparent 70%);
      pointer-events: none;
      z-index: 1;
    }

    .card {
      position: relative;
      z-index: 2;
      border-radius: 24px;
      padding: 44px 40px;
      width: 360px;
      max-width: 90vw;
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }

    .logo-box {
      width: 56px; height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      letter-spacing: -0.02em;
      color: rgba(255,255,255,0.95);
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      text-align: center;
      margin-bottom: 32px;
      letter-spacing: 0.01em;
    }

    .field { margin-bottom: 14px; }
    .field:last-of-type { margin-bottom: 24px; }

    .submit-btn {
      width: 100%;
      padding: 13px;
      font-size: 15px;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="space-bg"></div>
  <div class="glow"></div>

  <div class="card glass-dark fade-in">
    <div class="logo-wrap">
      <div class="logo-box glass">
        <img src="/favicon.svg" width="36" height="36" alt="logo">
      </div>
    </div>

    <h1>PhotoDock</h1>
    <p class="subtitle">Sign in to continue</p>

    <div id="errorMsg" class="error-banner" style="display:none">Incorrect username or password.</div>

    <form method="POST" action="/login">
      <div class="field">
        <div class="field-label">Username</div>
        <input class="glass-input" type="text" name="username" placeholder="admin" autofocus autocomplete="username">
      </div>
      <div class="field">
        <div class="field-label">Password</div>
        <input class="glass-input" type="password" name="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="cyan-btn submit-btn">Sign in</button>
    </form>

    <div id="ssoWrap" style="display:none">
      <div style="display:flex;align-items:center;gap:10px;margin:18px 0 14px">
        <div style="flex:1;height:1px;background:rgba(255,255,255,0.12)"></div>
        <span style="font-size:11px;color:rgba(255,255,255,0.35)">or</span>
        <div style="flex:1;height:1px;background:rgba(255,255,255,0.12)"></div>
      </div>
      <a id="ssoMicrosoft" href="/api/sso/microsoft/login" class="glass-btn submit-btn"
         style="display:none;align-items:center;justify-content:center;gap:9px;text-decoration:none;color:#fff;margin-bottom:10px">
        <svg width="17" height="17" viewBox="0 0 21 21" aria-hidden="true"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
        Sign in with Microsoft
      </a>
      <a id="ssoGoogle" href="/api/sso/google/login" class="glass-btn submit-btn"
         style="display:none;align-items:center;justify-content:center;gap:9px;text-decoration:none;color:#fff">
        <svg width="17" height="17" viewBox="0 0 48 48" aria-hidden="true"><path fill="#4285F4" d="M45.1 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h11.8c-.5 2.7-2 5-4.4 6.6v5.5h7.1c4.1-3.8 6.6-9.4 6.6-16.1z"/><path fill="#34A853" d="M24 46c5.9 0 10.9-2 14.5-5.3l-7.1-5.5c-2 1.3-4.5 2.1-7.4 2.1-5.7 0-10.5-3.8-12.2-9h-7.3v5.7C8.1 41 15.4 46 24 46z"/><path fill="#FBBC05" d="M11.8 28.3c-.4-1.3-.7-2.7-.7-4.3s.3-3 .7-4.3v-5.7H4.5C3 17 2 20.4 2 24s1 7 2.5 10z"/><path fill="#EA4335" d="M24 10.7c3.2 0 6.1 1.1 8.4 3.3l6.3-6.3C34.9 4.1 29.9 2 24 2 15.4 2 8.1 7 4.5 14l7.3 5.7c1.7-5.2 6.5-9 12.2-9z"/></svg>
        Sign in with Google
      </a>
    </div>

    <p style="text-align:center;margin-top:18px">
      <a href="/forgot" style="font-size:13px;color:rgba(255,255,255,0.5);text-decoration:none">Forgot your password?</a>
    </p>
  </div>

  <script>
    const err = new URLSearchParams(location.search).get('error');
    const el  = document.getElementById('errorMsg');
    if (err === 'locked') {
      el.textContent = 'Too many failed attempts. Try again in 15 minutes.';
      el.style.display = 'block';
    } else if (err === 'blocked') {
      el.textContent = 'This account has been blocked. Contact an administrator.';
      el.style.display = 'block';
    } else if (err === 'email') {
      el.textContent = 'Could not send your login code. The email server may not be configured.';
      el.style.display = 'block';
    } else if (err === 'sso_nolink') {
      el.textContent = 'No PhotoDock account is linked to that Microsoft account. Sign in normally, then connect it under Account.';
      el.style.display = 'block';
    } else if (err === 'sso') {
      el.textContent = 'Microsoft sign-in is unavailable right now.';
      el.style.display = 'block';
    } else if (err) {
      el.style.display = 'block';
    }

    // Show each SSO button only when that provider is configured.
    Promise.all([
      fetch('/api/sso/microsoft/enabled').then(r => r.json()).catch(() => ({})),
      fetch('/api/sso/google/enabled').then(r => r.json()).catch(() => ({})),
    ]).then(([ms, g]) => {
      if (ms.enabled) document.getElementById('ssoMicrosoft').style.display = 'flex';
      if (g.enabled)  document.getElementById('ssoGoogle').style.display = 'flex';
      if (ms.enabled || g.enabled) document.getElementById('ssoWrap').style.display = 'block';
    });
  </script>
</body>
</html>
