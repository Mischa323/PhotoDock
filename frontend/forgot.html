<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Reset password — PhotoDock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/glass.css">
  <style>
    body { height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .glow { position: absolute; width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, rgba(6,182,212,0.12), transparent 70%); pointer-events: none; z-index: 1; }
    .card { position: relative; z-index: 2; border-radius: 24px; padding: 44px 40px; width: 360px; max-width: 90vw; }
    .logo-wrap { display: flex; justify-content: center; margin-bottom: 24px; }
    .logo-box { width: 56px; height: 56px; border-radius: 14px; display: flex; align-items: center; justify-content: center; }
    h1 { font-size: 22px; font-weight: 700; text-align: center; letter-spacing: -0.02em; color: rgba(255,255,255,0.95); margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: rgba(255,255,255,0.4); text-align: center; margin-bottom: 32px; line-height: 1.5; }
    .field { margin-bottom: 24px; }
    .submit-btn { width: 100%; padding: 13px; font-size: 15px; border-radius: 12px; }
  </style>
</head>
<body>
  <div class="space-bg"></div>
  <div class="glow"></div>

  <div class="card glass-dark fade-in">
    <div class="logo-wrap"><div class="logo-box glass"><img src="/favicon.svg" width="36" height="36" alt="logo"></div></div>
    <h1>Reset password</h1>
    <p class="subtitle">Enter your account's email address and we'll send you a link to choose a new password.</p>

    <div id="okMsg" class="success-banner" style="display:none">
      If an account exists for that address, a reset link is on its way. Check your inbox.
    </div>

    <form id="form">
      <div class="field">
        <div class="field-label">Email address</div>
        <input class="glass-input" type="email" id="email" placeholder="you@example.com" autofocus autocomplete="email" required>
      </div>
      <button type="submit" class="cyan-btn submit-btn" id="btn">Send reset link</button>
    </form>

    <p style="text-align:center;margin-top:18px">
      <a href="/login" style="font-size:13px;color:rgba(255,255,255,0.5);text-decoration:none">← Back to sign in</a>
    </p>
  </div>

  <script>
    const form = document.getElementById('form');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      btn.disabled = true; btn.textContent = 'Sending…';
      try {
        await fetch('/api/password/forgot', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value.trim() })
        });
      } catch {}
      form.style.display = 'none';
      document.getElementById('okMsg').style.display = 'block';
    });
  </script>
</body>
</html>
